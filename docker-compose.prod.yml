services:
  frontend:
    build:
      context: .
      target: runner
      dockerfile: Dockerfile
    image: phuriphon47/lorem-e-commerce-frontend:latest
    container_name: lorem-frontend-prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_BACKEND_SERVER_ADDRESS=${NEXT_PUBLIC_BACKEND_SERVER_ADDRESS:-http://localhost:5000}
      - BACKEND_INTERNAL_ADDRESS=http://host.docker.internal:5000
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
