name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint, Typecheck, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Typecheck
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm run test:run

      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_SERVER_ADDRESS: http://localhost:5000
          JWT_SECRET: temp-jwt-secret-for-build

  build-docker:
    name: Test Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          build-args: |
            NEXT_PUBLIC_BACKEND_SERVER_ADDRESS=http://localhost:5000
          push: false
          tags: lorem-e-commerce-frontend:test
